const categories = ["すべて", ...new Set(data.map(d => d.cat))];

let currentCat = "すべて";

function renderFilters() {
  const wrap = document.getElementById('filter-wrap');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'すべて' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => filterBy(cat, btn);
    wrap.appendChild(btn);
  });
}

function filterBy(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('dict-list');
  list.innerHTML = '';
  const filtered = currentCat === 'すべて' ? data : data.filter(d => d.cat === currentCat);
  document.getElementById('visible-count').textContent = filtered.length;

  filtered.forEach((item, i) => {
    const globalIndex = data.indexOf(item);
    const card = document.createElement('div');
    card.className = 'dict-card';
    card.id = `card-${globalIndex}`;
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(${globalIndex})">
        <div class="card-num">${String(globalIndex + 1).padStart(2, '0')}</div>
        <div class="card-message-wrap">
          <div class="card-category">${item.cat}</div>
          <div class="card-message">${item.msg}</div>
        </div>
        <div class="card-toggle">▼</div>
      </div>
      <div class="card-body">
        <div class="divider"></div>
        <div class="section-label women">💭 女性が思うこと</div>
        <div class="bubble-women">${item.women}</div>
        <div class="section-label real">💡 本当の意味</div>
        <div class="bubble-real">${item.real}</div>
        <div class="section-label tip">✏️ おすすめの返し方</div>
        <div class="bubble-tip">${item.tip}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleCard(index) {
  const card = document.getElementById(`card-${index}`);
  card.classList.toggle('open');
}

function expandAll() {
  const cards = document.querySelectorAll('.dict-card');
  const allOpen = [...cards].every(c => c.classList.contains('open'));
  cards.forEach(c => allOpen ? c.classList.remove('open') : c.classList.add('open'));
  document.querySelector('.show-all-btn').textContent = allOpen ? '📖 全件まとめて開く' : '📕 全件まとめて閉じる';
}

renderFilters();
renderList();
</script>
